<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Action Bot</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
    /* Modern Styling */
    #ai-bot {
        position: fixed; bottom: 20px; right: 20px; width: 380px; max-height: 550px;
        background: #fff; border-radius: 14px; border: 1px solid #ddd;
        display: flex; flex-direction: column; font-family: 'Roboto', sans-serif;
        box-shadow: 0 6px 20px rgba(0,0,0,0.15); z-index: 9999; overflow: hidden;
    }
    #bot-header {
        font-weight: 700; padding: 12px; background: linear-gradient(90deg, #007bff, #0056b3);
        color: #fff; text-align: center;
    }
    #bot-messages {
        flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9;
        display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
    }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 14px; line-height: 1.4; }
    .user { align-self: flex-end; background: #007bff; color: white; }
    .bot { align-self: flex-start; background: #eef2f7; color: #333; border: 1px solid #dee2e6; }
    pre { background: #272822; color: #f8f8f2; padding: 10px; border-radius: 8px; font-size: 12px; overflow-x: auto; margin: 5px 0; }
    .exec-out { background: #e8ffe8; color: #155724; border: 1px solid #c3e6cb; }
    
    /* Controls */
    #bot-input-container { display: flex; padding: 10px; border-top: 1px solid #eee; background: #fff; gap: 5px; }
    #bot-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
    .icon-btn { border: none; background: #007bff; color: #fff; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; transition: 0.2s; }
    .icon-btn:hover { background: #0056b3; transform: scale(1.05); }
    #camera-preview { width: 100%; border-radius: 8px; margin-top: 5px; display: none; }
</style>
</head>
<body>

<div id="ai-bot">
    <div id="bot-header">AI Action Bot</div>
    <div id="bot-messages"></div>
    <video id="camera-preview" autoplay playsinline></video>
    <div id="bot-input-container">
        <button id="bot-camera" class="icon-btn">📷</button>
    <button id="bot-capture" class="icon-btn" title="Capture photo" style="display:none">📸</button>
        <button id="bot-voice" class="icon-btn">🎤</button>
        <button id="bot-send" class="icon-btn">➤</button>
    </div>
</div>

<script>
const messagesDiv = document.getElementById("bot-messages");
const input = document.getElementById("bot-input");
const video = document.getElementById("camera-preview");

function appendTile(content, type = 'bot', isCode = false) {
    const div = document.createElement(isCode ? "pre" : "div");
    div.className = isCode ? "msg bot pre" : `msg ${type}`;
    if (type === 'exec') div.classList.add('exec-out');
    div.textContent = content;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function appendConfirmationTile(content, onConfirm) {
    const div = document.createElement('div');
    div.className = 'msg bot';
    const p = document.createElement('div');
    p.textContent = content;
    const btn = document.createElement('button');
    btn.textContent = 'Confirm';
    btn.style.marginTop = '8px';
    btn.onclick = onConfirm;
    div.appendChild(p);
    div.appendChild(btn);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

const API_BASE = window.location.origin || "http://localhost:5000";
const INTERNAL_TOKEN = window.INTERNAL_TOKEN || ""; // Set this from your app if needed

let lastMessage = "";
let lastExecute = true;

async function sendMessage(text, execute = true, confirm = false) {
    const msg = text || input.value.trim();
    if (!msg) return;
    lastMessage = msg;
    lastExecute = execute;

    appendTile(msg, 'user');
    input.value = "";

    try {
        const res = await fetch(`${API_BASE}/generate`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                ...(INTERNAL_TOKEN ? { "X-Internal-Token": INTERNAL_TOKEN } : {})
            },
            body: JSON.stringify({ message: msg, execute, confirm })
        });
        const data = await res.json();

        if (data.requires_confirmation) {
            appendConfirmationTile(data.confirmation_message || "Please confirm to proceed.", () => {
                sendMessage(lastMessage, lastExecute, true);
            });
            return;
        }

        if (data.explanation) appendTile(data.explanation, 'bot');
        if (data.code) appendTile(data.code, 'bot', true);
        if (data.execution) {
            const out = (data.execution.stdout || "") + (data.execution.stderr || "");
            appendTile("Output: " + out, 'exec');
        }
    } catch (err) {
        appendTile("Error connecting to server. Is your Flask app running?", 'bot');
    }
}

// --- Voice Feature ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let mediaRecorder;
let audioChunks = [];
if (SpeechRecognition) {
    const recognition = new SpeechRecognition();

    document.getElementById("bot-voice").onclick = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            return;
        }

        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: "audio/webm" });
                const formData = new FormData();
                formData.append("file", blob, "recording.webm");

                appendTile("Uploading audio...", 'bot');
                try {
                    const res = await fetch(`${API_BASE}/generate-audio`, {
                        method: "POST",
                        body: formData
                    });
                    const data = await res.json();
                    appendTile(data.response || data.error || "No response", 'bot');
                } catch (err) {
                    appendTile("Audio upload failed: " + err, 'bot');
                }
            };

            mediaRecorder.start();
            appendTile("Recording audio... Click mic again to stop.", 'bot');
        }).catch(err => {
            appendTile("Microphone access denied.", 'bot');
        });
    };
}

// --- Camera Feature ---
const captureBtn = document.getElementById("bot-capture");
let cameraStream;

document.getElementById("bot-camera").onclick = async () => {
    if (video.style.display === "block") {
        video.style.display = "none";
        captureBtn.style.display = "none";
        const tracks = cameraStream?.getTracks() || [];
        tracks.forEach(track => track.stop());
        cameraStream = null;
        return;
    }

    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = cameraStream;
        video.style.display = "block";
        captureBtn.style.display = "inline-block";
        appendTile("Camera active. Click the photo button to capture and analyze.", 'bot');
    } catch (err) {
        appendTile("Camera access denied.", 'bot');
    }
};

captureBtn.onclick = async () => {
    if (!cameraStream) return;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(async (blob) => {
        if (!blob) return;
        const formData = new FormData();
        formData.append("file", blob, "capture.png");

        appendTile("Uploading image...", 'bot');
        try {
            const res = await fetch(`${API_BASE}/generate-image`, {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            appendTile(data.response || data.error || "No response", 'bot');
        } catch (err) {
            appendTile("Image upload failed: " + err, 'bot');
        }
    }, "image/png");
};

document.getElementById("bot-send").onclick = () => sendMessage();
input.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };
</script>
</body>
</html>
